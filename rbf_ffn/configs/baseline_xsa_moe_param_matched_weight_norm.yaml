# XSA + Sparse MoE FFN (parameter-matched to SwiGLU) + weight norm.
#
# Experiment B: isolates the structural benefit of sparse routing from
# raw parameter count. Each expert uses ffn_hidden=172 so total FFN params
# match the SwiGLU baseline (ffn_hidden=688):
#
#   4 experts × 3 projections × 256 × 172 = 528,384  ≈  3 × 256 × 688 = 528,384
#
# Compare against baseline_xsa_moe_weight_norm.yaml (ffn_hidden=688, ~4× params).
# If this matches 47.31, routing is the mechanism. If it underperforms, the
# prior MoE gain was parameter count, not sparse routing.
attn_type: xsa
ffn_type: moe
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 172
dropout: 0.1
vocab_size: 50257
seq_len: 512
qk_norm: true
moe_n_experts: 4
moe_top_k: 2
linear_weight_norm: true
linear_weight_norm_value: 2.0
seed: 42
n_epochs: 3
batch_size: 16
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
