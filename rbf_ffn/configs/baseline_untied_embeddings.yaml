# Llama SwiGLU baseline with untied embeddings.
# lm_head uses its own weight matrix instead of reusing token_embedding.weight.
# Doubles the parameters at the embedding/output boundary; tests whether
# weight tying is helping or hurting this model size.
attn_type: standard
ffn_type: swiglu
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 688
dropout: 0.1
qk_norm: true
vocab_size: 65536
seq_len: 512
linear_weight_norm: true
linear_weight_norm_value: 2.0
linear_weight_norm_max_only: false
tie_embeddings: false
seed: 42
n_epochs: 3
batch_size: 16
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
