# RationalGLU with QK norm, weight norm, and activation coefficient norm
model_type: rationalglu
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 688
dropout: 0.1
qk_norm: true
vocab_size: 50257
seq_len: 512
seed: 42
n_epochs: 3
batch_size: 16
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
grad_accum_steps: 1
linear_weight_norm: true
linear_weight_norm_value: 2.0
activation_norm: true
