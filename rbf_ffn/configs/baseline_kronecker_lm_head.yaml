# Llama SwiGLU baseline with Kronecker-factored LM head.
# W ∈ R^{V×H} is never built; instead A ∈ R^{p×q} and B ∈ R^{m×n} are stored
# where (p, m) is the most balanced factor pair of vocab_size and (q, n) of d_model.
# Forward: reshape h → H_mat ∈ R^{n×q}, compute Z_mat = B H_mat A^T, flatten to logits.
# Avoids rank suppression during back-prop by keeping the two factors independent.
# tie_embeddings must be false — Kronecker lm_head has no single weight to tie.
model_type: baseline
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 688
dropout: 0.1
qk_norm: true
vocab_size: 65536
seq_len: 512
linear_weight_norm: true
linear_weight_norm_value: 2.0
linear_weight_norm_max_only: false
tie_embeddings: false
lm_head_kronecker: true
seed: 42
n_epochs: 10
batch_size: 16
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
