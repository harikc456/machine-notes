# XSA + SwiGLU (4× FFN width) + weight norm.
#
# Dense baseline at equivalent parameter budget to the full MoE run (§9.2):
#
#   SwiGLU FFN params: 3 × 256 × 2752 = 2,113,536  ≈  4 × 3 × 256 × 688 = 2,113,536
#
# Compare against baseline_xsa_moe_weight_norm.yaml (ffn_hidden=688, n_experts=4).
# If this matches 47.31, MoE's gain is pure parameter count (wider dense FFN suffices).
# If it underperforms, sparse routing adds structural benefit beyond raw capacity.
attn_type: xsa
ffn_type: swiglu
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 2752
dropout: 0.1
vocab_size: 50257
seq_len: 512
qk_norm: true
linear_weight_norm: true
linear_weight_norm_value: 2.0
seed: 42
n_epochs: 3
batch_size: 16
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
