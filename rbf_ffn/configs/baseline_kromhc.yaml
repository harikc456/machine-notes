# Llama SwiGLU baseline with KromHC head mixing.
# Direct comparison to kromhc_transformer/configs/baseline.yaml.
attn_type: standard
ffn_type: swiglu
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 688
dropout: 0.1
qk_norm: false
vocab_size: 50257
seq_len: 512
use_kromhc: true
seed: 42
n_epochs: 10
batch_size: 32
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
