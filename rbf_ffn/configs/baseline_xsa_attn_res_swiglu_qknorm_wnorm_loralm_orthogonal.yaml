# XSA + ReLU² FFN + qk_norm + weight_norm + LoRA LM head + selective orthogonal FFN.
#
# OrthogonalMLPWrapper applied to layers 1 and 3 only.
attn_type: xsa
ffn_type: swiglu
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 688
dropout: 0.1
vocab_size: 50257
seq_len: 512
qk_norm: true
use_attn_res: true
linear_weight_norm: true
linear_weight_norm_value: 2.0
linear_weight_norm_max_only: false
lm_head_lora_rank: 8
orthogonal_ffn_layers: [1, 3]
seed: 42
n_epochs: 3
batch_size: 16
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
