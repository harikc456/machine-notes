# XSA + Sparse MoE FFN with linear weight normalisation.
# Extends baseline_xsa_moe.yaml with bidirectional row-norm projection
# (target L2 norm = 2.0) applied after every optimizer step.
# Applies to all nn.Linear weight matrices including expert gate_proj,
# up_proj, down_proj, and the router — lm_head (tied to embedding) excluded.
attn_type: xsa
ffn_type: moe
norm_type: dynamic_erf
d_model: 256
n_heads: 8
n_layers: 6
ffn_hidden: 688
dropout: 0.1
vocab_size: 50257
seq_len: 512
qk_norm: true
moe_n_experts: 4
moe_top_k: 2
linear_weight_norm: true
linear_weight_norm_value: 2.0
seed: 42
n_epochs: 3
batch_size: 16
muon_lr: 0.02
adamw_lr: 0.0003
adamw_wd: 0.1
warmup_ratio: 0.02
grad_clip: 1.0
